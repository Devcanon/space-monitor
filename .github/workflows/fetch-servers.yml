name: Fetch SS14 Server Stats

on:
  schedule:
    # Запуски в :02, :07, :12, :17, ... каждого часа
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and save stats
        run: node scripts/fetch-servers.js

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/history.json
          git diff --staged --quiet || git commit -m "chore: update server stats $(date -u '+%H:%M UTC')"
          git push
