<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мониторинг им. Деканона</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="main-wrapper">
    <div class="monitor-container">

      <div class="header-block">
        <h1>Онлайны проектов</h1>
      </div>

      <div class="mode-tabs">
        <button id="tab-projects" class="mode-tab active">
          <i class="fa-solid fa-layer-group"></i> Проекты
        </button>
        <button id="tab-hub" class="mode-tab">
          <i class="fa-solid fa-globe"></i> Весь хаб
        </button>
      </div>

      <div id="current-time" class="current-time"></div>

      <div id="stats-bar" class="stats-bar">
        <div class="stat-item">
          <span class="stat-val" id="stat-total">—</span>
          <span class="stat-lbl">игроков</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
          <span class="stat-val col-green" id="stat-active">—</span>
          <span class="stat-lbl">онлайн</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
          <span class="stat-val col-red" id="stat-inactive">—</span>
          <span class="stat-lbl">офлайн</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
          <span class="stat-val col-pink" id="stat-18plus">—</span>
          <span class="stat-lbl">серверов 18+</span>
        </div>
      </div>

      <div id="servers-list">
        <p class="loading-text">Загрузка данных с API...</p>
      </div>

      <div class="footer">
        <p>Данные обновляются каждые 5 секунд</p>
      </div>
    </div>

    <div id="details-panel" class="details-panel">
      <div class="panel-content-wrapper">
        <div class="panel-header">
          <h2 id="panel-title">Детали проекта</h2>
          <button id="close-panel-btn" class="close-panel-btn">&times;</button>
        </div>
        <div id="details-server-list" class="panel-body"></div>
      </div>
    </div>
  </div>

  <div id="details-overlay" class="details-overlay"></div>
  <script src="script.js"></script>
</body>

</html>
